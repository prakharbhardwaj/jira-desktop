<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:;" />
    <link href="./styles.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira Desktop</title>
  </head>
  <body>
    <main class="app-shell">
      <div class="sidebar-trigger" id="sidebar-trigger"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand" aria-label="Jira Desktop">
          <svg class="brand-icon" width="20" height="20" viewBox="0 -30.63 255.32 285.96">
            <defs>
              <linearGradient id="jira-g1" x1="98.03%" x2="58.89%" y1=".16%" y2="40.77%">
                <stop offset=".18" stop-color="#0052cc" />
                <stop offset="1" stop-color="#2684ff" />
              </linearGradient>
              <linearGradient id="jira-g2" x1="100.67%" x2="55.4%" y1=".46%" y2="44.73%">
                <stop offset=".18" stop-color="#0052cc" />
                <stop offset="1" stop-color="#2684ff" />
              </linearGradient>
            </defs>
            <path
              d="M244.658 0H121.707a55.502 55.502 0 0 0 55.502 55.502h22.649V77.37c.02 30.625 24.841 55.447 55.466 55.467V10.666C255.324 4.777 250.55 0 244.658 0z"
              fill="#2684ff"
            />
            <path
              d="M183.822 61.262H60.872c.019 30.625 24.84 55.447 55.466 55.467h22.649v21.938c.039 30.625 24.877 55.43 55.502 55.43V71.93c0-5.891-4.776-10.667-10.667-10.667z"
              fill="url(#jira-g1)"
            />
            <path
              d="M122.951 122.489H0c0 30.653 24.85 55.502 55.502 55.502h22.72v21.867c.02 30.597 24.798 55.408 55.396 55.466V133.156c0-5.891-4.776-10.667-10.667-10.667z"
              fill="url(#jira-g2)"
            />
          </svg>
          <span class="badge">Jira Desktop</span>
          <div class="sidebar-brand-actions">
            <button class="sidebar-action-btn" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle light/dark"></button>
            <button class="sidebar-action-btn" id="sidebar-lock" type="button" aria-label="Lock sidebar" aria-pressed="false" title="Lock sidebar (⌘S)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="2" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none" />
                <line x1="6" y1="2" x2="6" y2="14" stroke="currentColor" stroke-width="1.5" />
              </svg>
            </button>
          </div>
        </div>
        <nav class="sidebar-tabs" id="tab-strip" role="tablist" aria-label="Open tabs"></nav>
        <div class="sidebar-footer">
          <div class="update-banner" id="update-banner" hidden>
            <div class="update-banner-header">
              <div class="update-banner-copy">
                <svg class="update-icon" width="14" height="14" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.4" />
                  <path d="M8 5v4M8 11v1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
                <span class="update-text" id="update-text">A new version is available</span>
              </div>
              <button class="update-dismiss" id="update-dismiss" type="button" aria-label="Dismiss">&times;</button>
            </div>
            <div class="update-actions">
              <button class="update-link" id="update-changelog" type="button">View changelog</button>
              <button class="update-action" id="update-action" type="button">Download</button>
            </div>
          </div>
          <button class="new-tab-button" id="new-tab-button" type="button" aria-label="Open a new tab" title="New tab">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
              <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span>New tab</span>
          </button>
        </div>
      </aside>
      <section class="stage">
        <div class="status-layer" id="status-layer" hidden>
          <section class="card">
            <div class="card-icon" id="card-icon" aria-hidden="true">
              <svg width="48" height="48" viewBox="0 -30.63 255.32 285.96">
                <defs>
                  <linearGradient id="jira-c1" x1="98.03%" x2="58.89%" y1=".16%" y2="40.77%">
                    <stop offset=".18" stop-color="#0052cc" />
                    <stop offset="1" stop-color="#2684ff" />
                  </linearGradient>
                  <linearGradient id="jira-c2" x1="100.67%" x2="55.4%" y1=".46%" y2="44.73%">
                    <stop offset=".18" stop-color="#0052cc" />
                    <stop offset="1" stop-color="#2684ff" />
                  </linearGradient>
                </defs>
                <path
                  d="M244.658 0H121.707a55.502 55.502 0 0 0 55.502 55.502h22.649V77.37c.02 30.625 24.841 55.447 55.466 55.467V10.666C255.324 4.777 250.55 0 244.658 0z"
                  fill="#2684ff"
                />
                <path
                  d="M183.822 61.262H60.872c.019 30.625 24.84 55.447 55.466 55.467h22.649v21.938c.039 30.625 24.877 55.43 55.502 55.43V71.93c0-5.891-4.776-10.667-10.667-10.667z"
                  fill="url(#jira-c1)"
                />
                <path
                  d="M122.951 122.489H0c0 30.653 24.85 55.502 55.502 55.502h22.72v21.867c.02 30.597 24.798 55.408 55.396 55.466V133.156c0-5.891-4.776-10.667-10.667-10.667z"
                  fill="url(#jira-c2)"
                />
              </svg>
            </div>
            <h1 id="title">Loading Jira</h1>
            <p id="message">Connecting to your Jira workspace...</p>
            <p class="meta" id="target-url"></p>
            <form class="workspace-form" id="workspace-form" hidden>
              <label class="workspace-label" for="workspace-url-input">Jira workspace URL</label>
              <input
                class="workspace-input"
                id="workspace-url-input"
                type="url"
                inputmode="url"
                autocomplete="url"
                spellcheck="false"
                placeholder="https://your-domain.atlassian.net"
                required
              />
              <p class="workspace-help">Use your Jira Cloud URL. Jira Desktop will save it locally for future launches.</p>
              <p class="workspace-error" id="workspace-error" hidden></p>
              <button class="workspace-submit" id="workspace-submit" type="button">Continue</button>
            </form>
            <div class="progress-bar" id="progress-bar" aria-hidden="true">
              <div class="progress-bar-fill"></div>
            </div>
            <button class="retry-button" id="retry-button" type="button" hidden>Retry</button>
          </section>
        </div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
