name: Release Desktop Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to publish, for example v1.0.1. Leave empty to build artifacts without creating a release."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macOS
            build_command: yarn release-mac-ci
            artifact_name: macos-builds
          - os: windows-latest
            platform: Windows
            build_command: yarn release-win
            artifact_name: windows-builds

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify tag matches package version
        if: github.ref_type == 'tag' || inputs.release_tag != ''
        shell: bash
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}"
          VERSION="$(node -p "require('./package.json').version")"

          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version v${VERSION}" >&2
            exit 1
          fi

      - name: Run smoke test
        run: yarn test:smoke

      - name: Build desktop artifacts
        run: ${{ matrix.build_command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    if: github.ref_type == 'tag' || inputs.release_tag != ''
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes appendix
        shell: bash
        run: |
          cat <<'EOF' > release-notes-extra.md
          ## macOS note

          The macOS build is currently unsigned and not notarized.

          If macOS warns that it cannot verify the app, open it manually through:
          `System Settings > Privacy & Security > Open Anyway`

          You can also right-click the app in Finder and choose `Open`.
          EOF

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          generate_release_notes: true
          body_path: release-notes-extra.md
          append_body: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
